<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 课堂调查</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 25px; text-align: center; }
        .header h1 { font-size: 22px; margin-bottom: 5px; }
        .content { padding: 25px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        .form-group label span { color: #667eea; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .checkbox-item { display: flex; align-items: center; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .checkbox-item.selected { border-color: #667eea; background: #f0f0ff; }
        .checkbox-item input { margin-right: 8px; }
        .rating { display: flex; gap: 10px; }
        .rating .star { width: 36px; height: 36px; border: 2px solid #e0e0e0; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
        .rating .star.active { border-color: #ffd700; background: #fff9e6; color: #ffd700; }
        .btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .result-box { background: #f8f9ff; border-radius: 12px; padding: 20px; text-align: center; }
        .result-box h3 { color: #667eea; margin-bottom: 15px; }
        .rank-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-size: 16px; font-weight: 600; background: #cd7f32; color: white; }
        .rank-king { background: linear-gradient(135deg, #667eea, #764ba2); }
        .rank-diamond { background: #b9f2ff; color: #333; }
        .rank-gold { background: #ffd700; color: #333; }
        .rank-silver { background: #c0c0c0; color: #333; }
        .success-msg { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦐 OpenClaw 课堂调查</h1>
            <p>AI 应用能力诊断</p>
        </div>
        <div class="content" id="formContent">
            <div class="form-group">
                <label>称呼 <span>*</span></label>
                <input type="text" id="name" placeholder="请输入名字">
            </div>
            <div class="form-group">
                <label>角色 <span>*</span></label>
                <select id="role">
                    <option value="">请选择...</option>
                    <option value="学生">学生</option>
                    <option value="教师">教师</option>
                    <option value="开发者">开发者</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>之前用过 AI 吗？</label>
                <select id="usedAI">
                    <option value="没有">没有</option>
                    <option value="ChatGPT">ChatGPT</option>
                    <option value="Claude">Claude</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>使用目的</label>
                <div class="checkbox-group" id="purposeGroup">
                    <label class="checkbox-item" onclick="this.classList.toggle('selected');this.querySelector('input').checked=!this.querySelector('input').checked"><input type="checkbox" value="查资料"> 查资料</label>
                    <label class="checkbox-item" onclick="this.classList.toggle('selected');this.querySelector('input').checked=!this.querySelector('input').checked"><input type="checkbox" value="写代码"> 写代码</label>
                    <label class="checkbox-item" onclick="this.classList.toggle('selected');this.querySelector('input').checked=!this.querySelector('input').checked"><input type="checkbox" value="聊天问答"> 聊天问答</label>
                    <label class="checkbox-item" onclick="this.classList.toggle('selected');this.querySelector('input').checked=!this.querySelector('input').checked"><input type="checkbox" value="文档处理"> 文档处理</label>
                </div>
            </div>
            <div class="form-group">
                <label>使用频率</label>
                <select id="frequency">
                    <option value="偶尔">偶尔</option>
                    <option value="每周">每周</option>
                    <option value="每天">每天</option>
                </select>
            </div>
            <div class="form-group">
                <label>熟练度 (1-5)</label>
                <div class="rating" id="rating">
                    <div class="star" onclick="setRating(1)">1</div>
                    <div class="star" onclick="setRating(2)">2</div>
                    <div class="star" onclick="setRating(3)">3</div>
                    <div class="star" onclick="setRating(4)">4</div>
                    <div class="star" onclick="setRating(5)">5</div>
                </div>
            </div>
            <button class="btn" onclick="generateReport()">生成报告</button>
        </div>
        <div class="content" id="resultContent" style="display:none;">
            <div class="success-msg">✅ 报告已生成！</div>
            <div class="result-box">
                <h3>🏆 你的段位</h3>
                <span class="rank-badge" id="rankBadge">青铜</span>
                <p id="rankDesc" style="margin-top:10px;color:#666;">刚刚起步</p>
            </div>
            <div style="margin-top:20px;">
                <button class="btn" onclick="sendEmail()">📧 发送到邮箱</button>
            </div>
            <div style="margin-top:15px;">
                <button class="btn" onclick="copyResult()" style="background:#6c757d;">📋 复制结果</button>
            </div>
            <div style="margin-top:15px;">
                <button class="btn" onclick="resetForm()" style="background:#28a745;">🔄 重新填写</button>
            </div>
        </div>
    </div>
    <script>
        let userData = {name:'',role:'',usedAI:'',purposes:[],frequency:'',rating:0};
        function setRating(v){userData.rating=v;document.querySelectorAll('.rating .star').forEach((s,i)=>s.classList.toggle('active',i<v));}
        function calculateScore(){
            let s=0;
            if(userData.usedAI!=='没有')s+=1;
            s+=userData.purposes.length*0.5;
            if(userData.frequency==='每天')s+=2;else if(userData.frequency==='每周')s+=1;
            s+=userData.rating;
            return s;
        }
        function getRank(s){
            if(s>=8)return{r:'王者',c:'rank-king',d:'AI大神！'};
            if(s>=6)return{r:'钻石',c:'rank-diamond',d:'熟练玩家！'};
            if(s>=4)return{r:'黄金',c:'rank-gold',d:'进阶玩家！'};
            if(s>=2)return{r:'白银',c:'rank-silver',d:'入门玩家！'};
            return{r:'青铜',c:'','d':'刚刚起步！'};
        }
        function generateReport(){
            userData.name=document.getElementById('name').value.trim();
            userData.role=document.getElementById('role').value;
            if(!userData.name||!userData.role){alert('请填写必填项');return;}
            userData.usedAI=document.getElementById('usedAI').value;
            userData.frequency=document.getElementById('frequency').value;
            userData.purposes=[];
            document.querySelectorAll('#purposeGroup input:checked').forEach(i=>userData.purposes.push(i.value));
            let score=calculateScore(),rk=getRank(score);
            document.getElementById('rankBadge').textContent=rk.r;
            document.getElementById('rankBadge').className='rank-badge '+rk.c;
            document.getElementById('rankDesc').textContent=rk.d;
            document.getElementById('formContent').style.display='none';
            document.getElementById('resultContent').style.display='block';
        }
        function sendEmail(){
            let score=calculateScore(),rk=getRank(score);
            let body=`🦐 OpenClaw 课堂调查

📛 称呼：${userData.name}
🎭 角色：${userData.usedAI}
🤖 使用过：${userData.usedAI}
📊 目的：${userData.purposes.join(',')||'无'}
📈 频率：${userData.frequency}
⭐ 熟练度：${userData.rating}/5

🏆 段位：${rk.r} | 分数：${score.toFixed(1)}`;
            window.location.href=`mailto:?subject=OpenClaw调查-${userData.name}&body=${encodeURIComponent(body)}`;
        }
        function copyResult(){
            let score=calculateScore(),rk=getRank(score);
            let text=`🦐 OpenClaw 课堂调查

📛 称呼：${userData.name}
🎭 角色：${userData.role}
🤖 使用过：${userData.usedAI}
📊 目的：${userData.purposes.join(',')||'无'}
📈 频率：${userData.frequency}
⭐ 熟练度：${userData.rating}/5

🏆 段位：${rk.r} | 分数：${score.toFixed(1)}`;
            navigator.clipboard.writeText(text).then(()=>alert('已复制！'));
        }
        function resetForm(){
            document.getElementById('name').value='';
            document.getElementById('role').value='';
            document.getElementById('usedAI').value='没有';
            document.getElementById('frequency').value='偶尔';
            document.querySelectorAll('#purposeGroup .checkbox-item').forEach(i=>{i.classList.remove('selected');i.querySelector('input').checked=false});
            setRating(0);
            document.getElementById('formContent').style.display='block';
            document.getElementById('resultContent').style.display='none';
        }
    </script>
</body>
</html>
